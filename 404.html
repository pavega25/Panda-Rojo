<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Panda Perdido</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #590202;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            text-align: center;
        }
        section {
            background-color: #FBEEE0;
            padding: 50px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .title span {
            font-size: 6em;
            font-weight: 900;
        }
        .title {
            line-height: 50px;
            font-size: 1.2em;
            font-weight: 600;
        }
        .paw-title {
            font-size: 10em;
            color: #BF1304;
        }
        h2 {
            font-size: 2em;
        }
        a {
            margin: 25px;
            padding: 10px;
            background-color: #590202;
            color: #FBEEE0;
            text-decoration: none;
            border-radius: 30px;
            display: block;
        }
        .p-body {
            margin-top: 20px;
            background-color: #400106;
            color: #FBEEE0;
            padding-top: 20px;
            padding-bottom: 20px;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: 500;
        }
        @media (max-width: 500px) {
            body {
                margin: 0 20px;
            }
        }
    </style>
</head>
<body>
    <section>
        <div class="e-header">
            <div class="paw-title"><i class="fa-solid fa-paw"></i></div>
            <p class="title">Error <br><span>404</span></p>
        </div>
        <div class="e-body">
            <h2>¡Ooops página no encontrada!</h2>
            <p class="p-body">Esta página se perdió en el bosque de bambú.</p>
            <a href="index.html">Volver al inicio</a>
        </div>
        <div class="e-footer">
            <p><small>#ProtegeAlPandaRojo</small></p>
        </div>
    </section>
</body>
</html>
